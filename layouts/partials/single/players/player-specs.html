<!-- Player Info & Stats -->
{{ if .Params.player_specs }}
<div class="player-specs">
    <h2 id="{{ .Params.player_name | urlize }}-info">{{ .Params.player_name }} Info</h2>
    {{ range .Params.player_specs }}
    <div class="main-container">
        <h3 id="{{ .player_name | urlize }}">{{ .player_name }}</h3>
        <table>
            <tbody>
                {{ range .player_attributes }}
                <tr>
                    <td>{{ .attribute_name }}</td>
                    <td>{{ .attribute_value }}</td>
                </tr>
                {{ end }}
            </tbody>
        </table>
    </div>
    {{ end }}
</div>
{{ end }}

<style>
    .player-specs {
        background-color: #f9f9f9;
        margin-bottom: 20px;
    }

    .player-specs h3 {
        margin-bottom: 15px;
        color: #333;
    }

    .player-specs table {
        width: 100%;
        border-collapse: collapse;
    }

    .player-specs tbody {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
    }

    .player-specs tr {
        display: flex;
        flex: 0 0 calc(50% - 10px);
        justify-content: space-between;
        align-items: center;
        padding: 10px 0;
        border-bottom: 1px solid #e0e0e0;
    }

    .player-specs td {
        flex: 1;
    }

    .player-specs td:first-child {
        color: #475569;
        text-align: left; /* Ensure left alignment */
    }

    .player-specs td:nth-child(2) {
        color: #000000;
        text-align: right; /* Ensure right alignment */
    }

    /* Mobile-friendly adjustments */
    @media (max-width: 768px) {
        .player-specs tbody {
            gap: 5px;
        }

        .player-specs tr {
            flex: 0 0 100%; /* Full width on smaller screens */
        }

        .player-specs td {
            font-size: 0.9rem; /* Slightly smaller font for better fit */
        }
    }

    @media (max-width: 480px) {
        .player-specs tbody {
            gap: 5px;
        }

        .player-specs tr {
            flex-direction: column; /* Stack content vertically for narrow screens */
            align-items: flex-start;
        }

        .player-specs td {
            flex: none; /* Allow table cells to adjust naturally */
            width: 100%;
            text-align: left; /* Ensure left alignment on narrow screens */
            padding: 5px 0;
        }

        .player-specs td:nth-child(2) {
            text-align: right; /* Keep right alignment for second column */
        }
    }
</style>
